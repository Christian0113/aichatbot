<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 聊天网站</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
    }
    h1 {
      text-align: center;
    }
    #chatBox {
      border: 1px solid #ddd;
      border-radius: 10px;
      height: 400px;
      overflow-y: auto;
      padding: 16px;
      margin-bottom: 12px;
      background: #fafafa;
    }
    .msg {
      margin: 10px 0;
      line-height: 1.6;
    }
    .user {
      color: #0b57d0;
    }
    .ai {
      color: #188038;
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
    }
    button {
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>AI 聊天网站</h1>

  <div id="chatBox"></div>

  <div class="input-row">
    <input id="messageInput" type="text" placeholder="输入你的问题..." />
    <button onclick="sendMessage()">发送</button>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const messageInput = document.getElementById("messageInput");

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.innerHTML = `<strong>${role === "user" ? "你" : "AI"}：</strong>${text}`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      addMessage("user", message);
      messageInput.value = "";

      addMessage("ai", "思考中...");

      const aiLoading = chatBox.lastChild;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        aiLoading.innerHTML = `<strong>AI：</strong>${data.reply}`;
      } catch (err) {
        aiLoading.innerHTML = `<strong>AI：</strong>请求失败，请稍后再试。`;
      }
    }

    messageInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
